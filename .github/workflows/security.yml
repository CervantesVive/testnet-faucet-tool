name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --all-extras

      # CVE-2025-69277 (pynacl): fix (1.6.2) only ships wheels for Python 3.14+;
      # project supports >=3.11. Revisit once the floor moves to 3.14.
      - run: uv run --with pip-audit pip-audit --ignore-vuln CVE-2025-69277
